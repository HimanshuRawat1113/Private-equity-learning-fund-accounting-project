<svg width="680" height="500" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#444441" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect x="190" y="30" width="300" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
<text x="340" y="57" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#2C2C2A">Cash available for distribution</text>
<line x1="340" y1="74" x2="340" y2="106" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="140" y="106" width="400" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="340" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#04342C">Tier 1 — Return of capital</text>
<text x="340" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#085041">100% to LPs until capital is returned</text>
<line x1="340" y1="162" x2="340" y2="194" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="140" y="194" width="400" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="340" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#04342C">Tier 2 — Preferred return (hurdle)</text>
<text x="340" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#085041">100% to LPs, typically 8% compounded</text>
<line x1="340" y1="250" x2="340" y2="282" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="140" y="282" width="400" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1.5"/>
<text x="340" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#412402">Tier 3 — GP catch-up</text>
<text x="340" y="326" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#633806">Mostly to GP, until carry share reached</text>
<line x1="340" y1="338" x2="340" y2="370" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="140" y="370" width="400" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="340" y="394" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#4A1B0C">Tier 4 — Carried interest split</text>
<text x="340" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#712B13">Remaining profit, typically 80 / 20</text>

<text x="340" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">Legend: teal = LP-only tiers, amber = GP-favoured tier, coral = shared split</text>
</svg>
