<svg width="680" height="360" viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff">
<defs>
<marker id="arrow3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<text x="40" y="40" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#2C2C2A">European — whole-fund gate</text>
<line x1="40" y1="70" x2="640" y2="70" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow3)"/>
<text x="180" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">Yr 3: Deal A exits</text>
<circle cx="180" cy="70" r="4" fill="#888780"/>
<text x="380" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">Yr 5: Deal B exits</text>
<circle cx="380" cy="70" r="4" fill="#888780"/>
<rect x="520" y="52" width="110" height="36" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="575" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4A1B0C">Fund close: carry paid</text>

<line x1="40" y1="160" x2="640" y2="160" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="2 4"/>

<text x="40" y="190" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#2C2C2A">American — deal-by-deal gate</text>
<line x1="40" y1="220" x2="640" y2="220" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow3)"/>
<rect x="140" y="200" width="100" height="36" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
<text x="190" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#412402">Yr 3: escrow +5.5cr</text>

<rect x="330" y="200" width="100" height="36" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
<text x="380" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#412402">Yr 5: escrow +3.4cr</text>

<rect x="520" y="200" width="110" height="36" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="575" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4A1B0C">Close: clawback 6.9cr</text>

<text x="340" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">Same three deals, same eventual clawback outcome —</text>
<text x="340" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">the difference is purely when cash actually moves for the GP</text>
